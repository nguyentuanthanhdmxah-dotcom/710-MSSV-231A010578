<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bài 1</title>

<style>
body {
  font-family: Arial;
  text-align:center;
  background:#f4f4f4;
}

h2 {
  color:#2c3e50;
}

input {
  padding:10px;
  width:250px;
  margin:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* grid */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  padding:20px;
}

/* card */
.item {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px #ccc;
  transition:0.3s;
}

.item:hover {
  transform:scale(1.05);
  background:#3498db;
  color:white;
}

/* message */
#msg {
  font-weight:bold;
  color:red;
}

#count {
  margin-top:10px;
  color:#555;
}
</style>

</head>
<body>

<h2>Danh sách sản phẩm</h2>

<input id="search" placeholder="🔍 Tìm sản phẩm...">

<div id="count"></div>
<div id="msg"></div>

<div id="list" class="grid"></div>

<script>
const products = [
 "Iphone","Samsung","Xiaomi","Oppo","Nokia"
];

function render(arr){
 list.innerHTML = arr.map(p=>`<div class="item">${p}</div>`).join("");
 count.innerText = "Số sản phẩm: " + arr.length;
}

render(products);

search.oninput = function(){
 let val = this.value.toLowerCase().trim();

 let result = products.filter(p =>
   p.toLowerCase().includes(val)
 );

 if(result.length){
   msg.innerText = "";
   render(result);
 } else {
   list.innerHTML = "";
   count.innerText = "";
   msg.innerText = "❌ Không tìm thấy sản phẩm";
 }
}
</script>

<p><b>Giải thích:</b> Dùng filter để tìm kiếm, toLowerCase tránh phân biệt hoa thường, trim xử lý khoảng trắng, hiển thị số lượng để tối ưu UX.</p>

</body>
</html>
