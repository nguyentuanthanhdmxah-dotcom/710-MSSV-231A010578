<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bài 2</title>

<style>
body {font-family: Arial; text-align:center;}

form {
  max-width:300px;
  margin:auto;
}

input, button {
  width:100%;
  margin:5px 0;
  padding:8px;
}

.error {
  color:red;
  font-size:13px;
}

.success {
  color:green;
  font-size:13px;
  font-weight:bold;
}
</style>

</head>
<body>

<h2>Đăng ký</h2>

<form id="form">

<input id="name" placeholder="Tên">
<div id="errName" class="error"></div>

<input id="email" placeholder="Email">
<div id="errEmail" class="error"></div>

<input id="pass" type="password" placeholder="Mật khẩu">
<div id="errPass" class="error"></div>

<label>
<input type="checkbox" id="agree"> Đồng ý điều khoản
</label>
<div id="errAgree" class="error"></div>

<div id="success" class="success"></div>

<button type="submit">Đăng ký</button>

</form>

<script>
const form = document.getElementById("form");

form.addEventListener("submit", function(e){
  e.preventDefault();

  // reset lỗi
  document.getElementById("errName").innerText = "";
  document.getElementById("errEmail").innerText = "";
  document.getElementById("errPass").innerText = "";
  document.getElementById("errAgree").innerText = "";
  document.getElementById("success").innerText = "";

  let ok = true;

  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let pass = document.getElementById("pass").value;
  let agree = document.getElementById("agree").checked;

  // validate
  if(name === ""){
    document.getElementById("errName").innerText = "Vui lòng nhập tên";
    ok = false;
  }

  let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!regex.test(email)){
    document.getElementById("errEmail").innerText = "Email không hợp lệ";
    ok = false;
  }

  if(pass.length < 8){
    document.getElementById("errPass").innerText = "Mật khẩu >= 8 ký tự";
    ok = false;
  }

  if(!agree){
    document.getElementById("errAgree").innerText = "Bạn phải đồng ý điều khoản";
    ok = false;
  }

  if(!ok) return;

  // lưu localStorage
  localStorage.setItem("user", JSON.stringify({name, email}));

  // thông báo thành công
  document.getElementById("success").innerText = "✔ Đăng ký thành công!";

  // reset form
  form.reset();
});
</script>

</body>
</html>
