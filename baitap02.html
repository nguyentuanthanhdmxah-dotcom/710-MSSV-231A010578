<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bài 2</title>
<style>
body {font-family: Arial; text-align:center;}
form {
  max-width:300px;
  margin:auto;
}
input, button {
  width:100%;
  margin:5px 0;
  padding:8px;
}
#msg {
  margin-top:10px;
  color: green;
  font-weight: bold;
}
</style>
</head>
<body>

<h2>Đăng ký</h2>

<form id="f">
<input id="name" placeholder="Tên">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Mật khẩu">
<label><input type="checkbox" id="agree"> Đồng ý điều khoản</label>
<button>Đăng ký</button>
</form>

<div id="msg"></div>

<script>
f.onsubmit = e=>{
 e.preventDefault();

 let emailVal = email.value.trim();
 let passVal = pass.value;

 let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

 if(!regex.test(emailVal)) return alert("Email không hợp lệ");

 if(passVal.length < 8) return alert("Mật khẩu phải >= 8 ký tự");

 if(!agree.checked) return alert("Phải đồng ý điều khoản");

 // lưu dữ liệu
 localStorage.setItem("user", JSON.stringify({email: emailVal}));

 // hiện thông báo trên web
 document.getElementById("msg").innerText = "Đăng ký thành công!";

 // reset form
 f.reset();
}
</script>

</body>
</html>
