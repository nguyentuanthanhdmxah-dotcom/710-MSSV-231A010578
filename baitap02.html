<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bài 2</title>

<style>
body {font-family: Arial; text-align:center;}

form {
  max-width:300px;
  margin:auto;
}

input, button {
  width:100%;
  margin:5px 0;
  padding:8px;
}

.error {
  color:red;
  font-size:13px;
}

/* màn hình thành công */
#successScreen {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#2ecc71;
  color:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#successScreen h1 {
  font-size:30px;
}

#successScreen button {
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:white;
  color:#2ecc71;
  cursor:pointer;
}
</style>

</head>
<body>

<h2>Đăng ký</h2>

<form id="form">

<input id="name" placeholder="Tên">
<div id="errName" class="error"></div>

<input id="email" placeholder="Email">
<div id="errEmail" class="error"></div>

<input id="pass" type="password" placeholder="Mật khẩu">
<div id="errPass" class="error"></div>

<label>
<input type="checkbox" id="agree"> Đồng ý điều khoản
</label>
<div id="errAgree" class="error"></div>

<button type="submit">Đăng ký</button>

</form>

<!-- 👇 MÀN HÌNH THÀNH CÔNG -->
<div id="successScreen">
  <h1>🎉 Đăng ký thành công!</h1>
  <p>Chúc bạn học tốt 🚀</p>
  <button onclick="goBack()">Quay lại</button>
</div>

<script>
const form = document.getElementById("form");

form.addEventListener("submit", function(e){
  e.preventDefault();

  // reset lỗi
  errName.innerText="";
  errEmail.innerText="";
  errPass.innerText="";
  errAgree.innerText="";

  let ok = true;

  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let pass = document.getElementById("pass").value;
  let agree = document.getElementById("agree").checked;

  let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if(name===""){
    errName.innerText="Vui lòng nhập tên";
    ok=false;
  }

  if(!regex.test(email)){
    errEmail.innerText="Email không hợp lệ";
    ok=false;
  }

  if(pass.length<8){
    errPass.innerText="Mật khẩu >= 8 ký tự";
    ok=false;
  }

  if(!agree){
    errAgree.innerText="Bạn phải đồng ý điều khoản";
    ok=false;
  }

  if(!ok) return;

  // lưu
  localStorage.setItem("user", JSON.stringify({name,email}));

  // 👇 HIỆN MÀN HÌNH THÀNH CÔNG
  document.getElementById("successScreen").style.display="flex";

  form.reset();
});

function goBack(){
  document.getElementById("successScreen").style.display="none";
}
</script>

</body>
</html>
